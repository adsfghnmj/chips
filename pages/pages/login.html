<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CHIPS</title>

<link rel="stylesheet" href="../style.css">

<style>
.login-card{
    width:420px;
    max-width:95%;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.15);
}

.login-card h1{
    text-align:center;
    margin-bottom:30px;
}

.login-card form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.login-card input{
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:16px;
    border:1px solid rgba(255,255,255,.12);
}

.login-card input::placeholder{
    color:#bbb;
}

.login-card p{
    text-align:center;
    margin-top:25px;
}

.login-card a{
    color:#00ff88;
    text-decoration:none;
}

#message{
    text-align:center;
    margin-top:20px;
    min-height:25px;
    color:#ffcc66;
}
</style>

</head>
<body>

<div class="background-grid"></div>
<div class="mouse-light"></div>

<header class="navbar">

<div class="logo">
CHIPS
</div>

<nav>

<a href="../index.html">
Home
</a>

<a href="register.html">
Register
</a>

</nav>

</header>

<section class="hero">

<div class="login-card">

<h1>Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="submit"
class="glass-btn vpn-btn">

Login

</button>

</form>

<div id="message"></div>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</section>

<script>

const form =
document.getElementById("loginForm");

const message =
document.getElementById("message");

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

message.innerHTML =
"Logging in...";

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const res =
await fetch(
"https://chips-api.chipsali.workers.dev/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await res.json();

if(data.success){

localStorage.setItem(
"chips_token",
data.token
);

localStorage.setItem(
"chips_user",
JSON.stringify(data.user)
);

window.location.href =
"dashboard.html";

}
else{

message.innerHTML =
data.message ||
"Invalid login.";

}

}
catch{

message.innerHTML =
"Cannot connect to server.";

}

});

</script>

<script src="../script.js"></script>

</body>
</html>
