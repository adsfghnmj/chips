```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | CHIPS</title>

<link rel="stylesheet" href="../style.css">

<style>

.dashboard-card{
    width:700px;
    max-width:95%;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.15);
}

.info{
    margin-top:20px;
    line-height:2;
    font-size:18px;
}

.status{
    margin-top:30px;
    font-size:24px;
}

.pending{
    color:#ffcc00;
}

.approved{
    color:#00ff88;
}

.rejected{
    color:#ff5555;
}

.buttons{
    margin-top:35px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.vpn-link{
    display:block;
    margin-top:20px;
    color:#00ff88;
    word-break:break-all;
}

.reason{
    margin-top:20px;
    color:#ff7777;
}

</style>

</head>
<body>

<div class="background-grid"></div>
<div class="mouse-light"></div>

<header class="navbar">

<div class="logo">
CHIPS
</div>

<nav>

<a href="../index.html">
Home
</a>

<a href="vpn.html">
VPN
</a>

</nav>

</header>

<section class="hero">

<div class="dashboard-card">

<h1>

Dashboard

</h1>

<div id="dashboard">

Loading...

</div>

</div>

</section>

<script>

const user =
JSON.parse(
localStorage.getItem(
"chips_user"
)
);

if(!user){

window.location.href =
"login.html";

}

function loadDashboard(){

const requests =
JSON.parse(
localStorage.getItem(
"vpn_requests"
)
|| "[]"
);

const req =
requests.find(
r =>
r.email === user.email
);

let status =
"none";

let vpnLink =
"";

let video =
"";

let reason =
"";

if(req){

status =
req.status;

vpnLink =
req.vpnLink;

video =
req.video;

reason =
req.reason;

}

document.getElementById(
"dashboard"
).innerHTML = `

<div class="info">

Username:
${user.username}

<br>

Email:
${user.email}

</div>

<div class="status ${status}">

${status==="pending"
? "🟡 Pending"
: ""}

${status==="approved"
? "🟢 Approved"
: ""}

${status==="rejected"
? "🔴 Rejected"
: ""}

${status==="none"
? "No VPN Request"
: ""}

</div>

${status==="approved"
?

`
<a
class="vpn-link"
href="${vpnLink}"
target="_blank">

${vpnLink}

</a>

<br>

<a
class="glass-btn"
href="${video}"
target="_blank">

Tutorial Video

</a>
`

:

""}

${status==="rejected"
?

`
<div class="reason">

Reason:
${reason}

</div>
`

:

""}

<div class="buttons">

<a
href="vpn.html"
class="glass-btn vpn-btn">

VPN

</a>

<a
href="https://donofa.ir/chipsowner/"
target="_blank"
class="glass-btn donate-btn">

Donate

</a>

<a
href="../index.html"
class="glass-btn">

Back Home

</a>

</div>

`;

}

loadDashboard();

</script>

<script src="../script.js"></script>

</body>
</html>
```
