<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | CHIPS</title>

<link rel="stylesheet" href="../style.css">

<style>
.register-card{
    width:420px;
    max-width:95%;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.15);
}

.register-card h1{
    text-align:center;
    margin-bottom:30px;
}

.register-card form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.register-card input{
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:16px;
    border:1px solid rgba(255,255,255,.12);
}

.register-card input::placeholder{
    color:#bbb;
}

.register-card p{
    margin-top:25px;
    text-align:center;
}

.register-card a{
    color:#00ff88;
    text-decoration:none;
}

#message{
    text-align:center;
    margin-top:20px;
    min-height:25px;
    color:#ffcc66;
}
</style>

</head>
<body>

<div class="background-grid"></div>
<div class="mouse-light"></div>

<header class="navbar">

<div class="logo">
CHIPS
</div>

<nav>

<a href="../index.html">
Home
</a>

<a href="login.html">
Login
</a>

</nav>

</header>

<section class="hero">

<div class="register-card">

<h1>Create Account</h1>

<form id="registerForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button
type="submit"
class="glass-btn vpn-btn">

Create Account

</button>

</form>

<div id="message"></div>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</section>

<script>

const form =
document.getElementById("registerForm");

const message =
document.getElementById("message");

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

message.innerHTML =
"Creating account...";

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const confirm =
document.getElementById("confirmPassword").value;

if(password!==confirm){

message.innerHTML =
"Passwords do not match.";

return;

}

try{

const res =
await fetch(
"https://YOUR-WORKER.workers.dev/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
}
);

const data =
await res.json();

if(data.success){

message.innerHTML =
"Account created successfully.";

setTimeout(()=>{

window.location.href =
"login.html";

},1500);

}
else{

message.innerHTML =
data.message ||
"Registration failed.";

}

}
catch{

message.innerHTML =
"Cannot connect to server.";

}

});

</script>

<script src="../script.js"></script>

</body>
</html>
